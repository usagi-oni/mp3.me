<!DOCTYPE html>
<html lang="en"></html>

<title>LISTEN NOW ♫</title>

</html>
<head>
<link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISTEN NOW ♫</title>
</head>

<section>


<div class="title-bar">

       <div class="mp3-txt"> Welcome to MP3ME!!! </div>

    <div class="title-bar-controls">
    <button class="min"></button>
    <button class="max"></button>
    <button class="close"></button>
    </div>
</section>

<body>
    <div class="mp3-window"></div>  

<div class="playermp3">
    <div class="mp-icon-hold">
    <div class="mp-icon">
        <img src="miku.jpg" alt="place holder for song image">
</div>
<div class="main-player"></div>

 </div>
 <select class="track-selection"></select>
 <div class="controllers">
    <div class="timer">00:00
 </div>
 <input type="range" min="1" max="100" value="0" class="seek-slide" onchange="seekto()">

<div class="duration">0:00</div>
<div class="player-buttons">
    <button class="button-prev" onclick="prevtrack()">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewbox="0 0 24 24"
fill="currentcolor" stroke="currentcolor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-skip-back-icon lucide-skip-back"><path d="M17.971 4.285A2 2 0 0 1 21 6v12a2 2 0 0 1-3.029 1.715l-9.997-5.998a2 2 0 0 1-.003-3.432z"/><path d="M3 20V4"/></svg>
</button>

    <button class="button-playpause" onclick="playpauseTrack()">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" 
    fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-play-icon lucide-play"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>
</button>
  
     <button class="button-next" onclick="nextTrack()">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" 
    fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-skip-forward-icon lucide-skip-forward"><path d="M21 4v16"/><path d="M6.029 4.285A2 2 0 0 0 3 6v12a2 2 0 0 0 3.029 1.715l9.997-5.998a2 2 0 0 0 .003-3.432z"/></svg>
     </button>
<div class="window-body">
<div class="fieldset">
<h1>mp3 player will be added soon....</h1>
</body>
